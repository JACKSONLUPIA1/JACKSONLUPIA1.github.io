<!DOCTYPE html>
<html lang="en">
<head>

<style>
    #ascii-inline {
      display: inline-block;
      white-space: pre;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.2;
      vertical-align: middle;
    }
</style>
</head>
<body>
<div class="container">
<h1>Jackson Lupia</h1>
<div class="tagline">
I am a <span class="purple" id="typed"></span><span class="cursor"></span>
</div>
<nav>
    <a href="/blog/index.html">Blog</a>
    <a href="/projects/index.html">Projects</a>
    <a href="#">GitHub</a>
    <a href="/whoami/index.html">whoami</a>
</nav>
<pre id="ascii-display"></pre>
</div>

<script src="/ascii.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const words = ["Web Security Analyst ", "Web Application Penetration Tester ", "Cyber Security Student "];
    let i = 0, j = 0, currentWord = "", isDeleting = false;
    const typedEl = document.getElementById("typed");

    function type() {
        currentWord = words[i];
        if (isDeleting) typedEl.textContent = currentWord.substring(0, j--);
        else typedEl.textContent = currentWord.substring(0, j++);
        if (!isDeleting && j === currentWord.length) { isDeleting = true; setTimeout(type, 1500); return; }
        if (isDeleting && j === 0) { isDeleting = false; i = (i + 1) % words.length; }
        setTimeout(type, isDeleting ? 50 : 150);
    }
    type();

    // ASCII Morph
    var element = document.getElementById('ascii-display');
    AsciiMorph(element, { x: 45, y: 15 });
});
</script>
</body>
</html>
